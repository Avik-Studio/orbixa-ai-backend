version: '3.8'

services:
  medical-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-bot-agentos
    ports:
      - "8000:8000"
    environment:
      # MongoDB Configuration
      - MONGODB_URL=${MONGODB_URL:-mongodb://mongodb:27017}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-medical_bot}
      
      # Qdrant Configuration
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-medical_knowledge_base}
      
      # Google AI Configuration
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL_ID=${GEMINI_MODEL_ID:-gemini-3-flash-preview}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE:-0.3}
      - GEMINI_TOP_P=${GEMINI_TOP_P:-0.8}
      
      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET}
      
      # AgentOS Configuration
      - AGENTOS_DESCRIPTION=${AGENTOS_DESCRIPTION:-Production runtime for Assessli medical AI assistant}
      - PORT=${PORT:-8000}
      - DEBUG=${DEBUG:-False}
    
    volumes:
      # Mount temp uploads directory
      - ./temp_uploads:/app/temp_uploads
    
    depends_on:
      - mongodb
    
    restart: unless-stopped
    
    networks:
      - medical-bot-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    image: mongo:7.0
    container_name: medical-bot-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=medical_bot
    restart: unless-stopped
    networks:
      - medical-bot-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  medical-bot-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
